        data_tests:
          - not_null
          - unique
      - name: shipment_business_id
        data_tests:
          - not_null
      - name: shipment_technical_id
        data_tests:
          - not_null
      - name: shipment_type
        data_tests:
          - not_null
      - name: meta_source_latest_file_path
        data_tests:
          - not_null
