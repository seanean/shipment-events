        data_tests:
          - not_null
      - name: meta_source_file_path_lst
        data_tests:
          - not_null
      - name: meta_root_business_key
        data_tests:
          - not_null
      - name: meta_source_tmst
        data_tests:
          - not_null
      - name: meta_insert_tmst
        data_tests:
          - not_null
      - name: meta_update_tmst
        data_tests:
          - not_null
