          - not_null
      - name: meta_source_tmst
        data_tests:
          - not_null
      - name: meta_insert_tmst
        data_tests:
          - not_null
      - name: meta_update_tmst
        data_tests:
          - not_null
      - name: meta_raw_offset_id
        data_tests:
          - not_null

  - name: cur_shipment_status
    description: Curated shipment_status data.
    columns:
      - name: shipment_status_uuid
        data_tests:
          - not_null
